# ═════════════════════════════════════════════════════════════════════
# setup.conf — source of truth for runtime configuration.
# ═════════════════════════════════════════════════════════════════════
#
# setup.sh reads this file + system detection → generates .env and
# compose.yaml. Those two files are DERIVED ARTIFACTS — never edit
# them directly. Any manual change to .env / compose.yaml is silently
# overwritten on the next ./build.sh / ./run.sh that omits --no-env.
# Edit this file instead, then re-run a build / run wrapper (or
# explicitly ./run.sh --setup) to regenerate the artifacts.
#
# How to edit:
#
#   1. (Recommended) ./setup_tui.sh — interactive TUI editor. Walks
#      each section, validates input against the same rules setup.sh
#      uses, and rewrites in place preserving section structure. The
#      TUI shows per-key documentation so this file can stay terse.
#
#   2. Manual edit — supported. Keep the section structure intact;
#      ad-hoc keys outside the documented sections are silently
#      dropped (no warning). After a manual edit, re-run any wrapper
#      (or ./run.sh --setup) to regenerate .env / compose.yaml.
#
# Override layering:
#
#   - Template default lives at <template>/setup.conf.
#   - Per-repo override lives at <repo>/setup.conf (created
#     automatically on first init).
#   - Section-level replace: a section present in <repo>/setup.conf
#     fully replaces the template's section. Sections the per-repo
#     file omits fall back to the template default — there is no
#     key-level merge inside a section.
#
# Syntax: lines starting with # and empty lines are ignored.
# Format is key = value (whitespace around keys / values is trimmed).
# Full per-key reference: README "Configuration" section, or run
# `./setup_tui.sh <section>` for interactive help.

# ═════════════════════════════════════════════════════════════════════
# [image] — IMAGE_NAME detection rules (tried in numeric order)
# ═════════════════════════════════════════════════════════════════════
[image]
rule_1 = prefix:docker_
rule_2 = suffix:_ws
rule_3 = @basename

# ═════════════════════════════════════════════════════════════════════
# [build] — Dockerfile build args + arch + build network
# ═════════════════════════════════════════════════════════════════════
[build]
target_arch =
network = auto
arg_1 = APT_MIRROR_UBUNTU=tw.archive.ubuntu.com
arg_2 = APT_MIRROR_DEBIAN=mirror.twds.com.tw
arg_3 = TZ=Asia/Taipei

# ═════════════════════════════════════════════════════════════════════
# [deploy] — GPU reservation (compose.yaml deploy.resources)
# ═════════════════════════════════════════════════════════════════════
[deploy]
gpu_mode = auto
gpu_count = all
gpu_capabilities = gpu compute utility graphics
# gpu_runtime: container runtime for GPU (auto detects Jetson/csv-mode
# nvidia-container-toolkit -> runtime: nvidia; nvidia forces it; off omits).
# Renamed from `runtime` in v0.41.0; the old key still works as a permanent
# alias (deprecation warning), removal at v1.0.0 (see doc/deprecations.md).
gpu_runtime = auto
# dri_groups: grant /dev/dri access for hardware GL on non-NVIDIA (Intel/
# AMD iGPU) hosts. auto = detect the host's video+render GIDs at setup time
# and add them via group_add to GUI services (numeric GIDs, per-host). off
# = never. Complements the NVIDIA gpu_* path; harmless when /dev/dri absent.
dri_groups = auto

# ═════════════════════════════════════════════════════════════════════
# [lifecycle] — container lifecycle policy
# ═════════════════════════════════════════════════════════════════════
# restart: docker restart policy for the devel service (extends:devel
# stages inherit it). One of: no | always | unless-stopped | on-failure |
# on-failure:N. Default `no` emits no restart: field (compose unchanged).
# Caveat: `always` / `unless-stopped` restart on ANY exit -- a stage that
# extends devel and exits 0 (e.g. the `test` service after base#493) will
# restart forever. Use `on-failure` / `on-failure:N` if you want auto-retry
# on failure without looping on success.
[lifecycle]
restart = no

# ═════════════════════════════════════════════════════════════════════
# [gui] — GUI display support
# ═════════════════════════════════════════════════════════════════════
[gui]
mode = auto

# ═════════════════════════════════════════════════════════════════════
# [network] — network mode, IPC, port mappings
# ═════════════════════════════════════════════════════════════════════
[network]
mode = host
ipc = host
pid = private
network_name =

# ═════════════════════════════════════════════════════════════════════
# [security] — container privilege / capabilities / security_opt
# ═════════════════════════════════════════════════════════════════════
[security]
# Privileges are opt-in (#466). Defaults are lean so lightweight repos
# (static servers, CI runners) and tooling stages that `extends: devel`
# stay clean. Enable only what the container needs -- uncomment below,
# or run `./setup_tui.sh` (security page) / `setup.sh add security.cap_add
# SYS_ADMIN`.
#
# Per-stage (#526): cap_add_<N> / cap_drop_<N> / security_opt_<N> (and the
# matching *_inherit toggles) are overridable per Dockerfile stage via a
# [stage:<name>] section, e.g. `[stage:probe]` + `security.cap_add_inherit
# = false` drops all inherited caps for a read-only stage while a flash
# stage keeps them. Same append-default / *_inherit=false-replaces rule as
# volumes / ports / env.
privileged = false
# cap_add_1 = SYS_ADMIN
# cap_add_2 = NET_ADMIN
# cap_add_3 = MKNOD
# security_opt_1 = seccomp:unconfined

# ═════════════════════════════════════════════════════════════════════
# [resources] — container resource limits (shm_size, etc.)
# ═════════════════════════════════════════════════════════════════════
[resources]
shm_size =

# ═════════════════════════════════════════════════════════════════════
# [environment] — machine-bound / set-once env defaults (env_N = KEY=VALUE)
# ═════════════════════════════════════════════════════════════════════
# Holds env vars that are STABLE for this image/repo -- the kind that do
# not change when you switch machines or tasks (e.g. a fixed RMW
# implementation, a baked-in default ROS_DOMAIN_ID). Per the env/workload
# boundary (ADR-00000003, axis A: "does it change when you switch
# machines?"), these become the runtime-stage `ENV` bake (#497 S3) so a
# bare `docker run` of the field image still gets sane defaults.
#
# Per-task / volatile env vars (API tokens, dataset selectors, a LOG_LEVEL
# you flip between runs) do NOT belong here -- they go in the gitignored
# `.env` workload overlay (#497 S2), which takes effect with only
# `make run` (no regenerate, no SETUP_CONF_HASH drift, no git churn).
[environment]

# ═════════════════════════════════════════════════════════════════════
# [tmpfs] — RAM-backed mount points (tmpfs_N = /path[:size=N])
# ═════════════════════════════════════════════════════════════════════
[tmpfs]

# ═════════════════════════════════════════════════════════════════════
# [devices] — host device bindings + cgroup rules
# ═════════════════════════════════════════════════════════════════════
[devices]
# Device binding is opt-in (#466). Uncomment to bind the whole /dev tree,
# or add specific nodes via `setup.sh add devices.device /dev/video0` or
# the TUI devices page.
# device_1 = /dev:/dev

# ═════════════════════════════════════════════════════════════════════
# [volumes] — workspace mount + extras (mount_N = host:container[:mode])
# ═════════════════════════════════════════════════════════════════════
[volumes]
mount_1 =

# ═════════════════════════════════════════════════════════════════════
# [additional_contexts] — extra named build contexts (context_N = name=source)
# ═════════════════════════════════════════════════════════════════════
[additional_contexts]

# ═════════════════════════════════════════════════════════════════════
# [logging] — Docker logging driver + rotation defaults + host file mount
#
# Applied uniformly to every compose service (devel / test / any
# auto-emitted Dockerfile stage). Optional per-service override is
# `[logging.<service>]` (key-level merge on top of [logging] — keys
# absent in the per-service section fall back to global). Closes #310.
#
# local_path (#328): when non-empty, setup.sh emits a per-service
# host bind mount `<resolved>:/var/log/<repo>` so container stdout
# can be tee'd to a host-side file. The helper that performs the
# tee is shipped into every image at the stable in-image path
# `/usr/local/lib/base/_entrypoint_logging.sh` (#368; COPY'd by
# Dockerfile.example's devel stage). Source it from the repo's
# `script/entrypoint.sh` with a single un-guarded line:
#   . /usr/local/lib/base/_entrypoint_logging.sh
# The helper is a no-op when LOG_FILE_PATH is unset, so the source
# line is safe to add unconditionally. Path semantics for the
# local_path value:
#   ./log/      relative to repo root
#   /abs/path/  absolute, used verbatim
#   ~/dir/      ~ expanded to $HOME
#   (empty)     feature disabled (default, back-compat)
# Default is empty — opt-in per repo via per-repo setup.conf.
# ═════════════════════════════════════════════════════════════════════
[logging]
driver = json-file
max_size = 10m
max_file = 3
compress = true
local_path =
