services:
  # ── Development environment ──────────────────────────────────
  devel:
    build:
      context: .
      dockerfile: Dockerfile
      target: devel
      args:
        ROS_DISTRO: ${ROS_DISTRO:-noetic}
        ROS_TAG: ${ROS_TAG:-ros-base}
        UBUNTU_CODENAME: ${UBUNTU_CODENAME:-focal}
        USER: ${USER_NAME}
        GROUP: ${USER_GROUP}
        UID: ${USER_UID}
        GID: ${USER_GID}
        HARDWARE: ${HARDWARE}
    image: ${DOCKER_HUB_USER}/${IMAGE_NAME}:devel
    container_name: ${IMAGE_NAME}
    privileged: true
    network_mode: host
    ipc: host
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY:-}
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR:-/run/user/1000}
      - XAUTHORITY=${XAUTHORITY:-}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - ${XDG_RUNTIME_DIR:-/run/user/1000}:${XDG_RUNTIME_DIR:-/run/user/1000}:ro
      - ${XAUTHORITY:-/dev/null}:${XAUTHORITY:-/dev/null}:ro
      - /dev:/dev
      - ${WS_PATH}:/home/${USER_NAME}/work
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── Smoke test (ephemeral) ───────────────────────────────────
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
      args:
        ROS_DISTRO: ${ROS_DISTRO:-noetic}
        ROS_TAG: ${ROS_TAG:-ros-base}
        UBUNTU_CODENAME: ${UBUNTU_CODENAME:-focal}
        USER: ${USER_NAME}
        GROUP: ${USER_GROUP}
        UID: ${USER_UID}
        GID: ${USER_GID}
        HARDWARE: ${HARDWARE}
    image: ${DOCKER_HUB_USER}/${IMAGE_NAME}:test
    profiles:
      - test

  # ── Runtime (minimal) ───────────────────────────────────────
  runtime:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        ROS_DISTRO: ${ROS_DISTRO:-noetic}
        ROS_TAG: ${ROS_TAG:-ros-base}
        UBUNTU_CODENAME: ${UBUNTU_CODENAME:-focal}
        USER: ${USER_NAME}
        GROUP: ${USER_GROUP}
        UID: ${USER_UID}
        GID: ${USER_GID}
    image: ${DOCKER_HUB_USER}/${IMAGE_NAME}:runtime
    container_name: ${IMAGE_NAME}-runtime
    privileged: true
    network_mode: host
    ipc: host
    stdin_open: true
    tty: true
    volumes:
      - /dev:/dev
      - ${WS_PATH}:/home/${USER_NAME}/work
    profiles:
      - runtime
