services:
  # ── Runtime ────────────────────────────────────────────────
  runtime:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ${DOCKER_HUB_USER:-local}/sick_noetic:latest
    container_name: sick_noetic
    privileged: true
    network_mode: host
    ipc: host
    stdin_open: true
    tty: true
    volumes:
      - /dev:/dev

  # ── Smoke test (ephemeral) ─────────────────────────────────
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    image: ${DOCKER_HUB_USER:-local}/sick_noetic:test
    profiles:
      - test
